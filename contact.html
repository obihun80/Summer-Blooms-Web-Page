<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact • Summer Blooms</title>

  <!-- Typography loaded from stylesheet -->
  <link rel="stylesheet" href="./style.css">
</head>

<body class="contact-page">

<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="index.html" aria-label="Summer Blooms home">
      <img class="site-logo" src="images/logo.png" alt="Summer Blooms logo">
    </a>

    <nav class="nav" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="director.html">Artistic Director</a>
      <a href="concerts.html">Concerts</a>
      <a href="auditions.html">Auditions</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>

    <button class="menu-btn" id="menuBtn" aria-expanded="false" aria-controls="mobile-drawer" aria-label="Open menu">
      <span class="hamburger" aria-hidden="true"></span>
    </button>
  </div>

  <div id="mobile-drawer" class="mobile-drawer" data-open="false" aria-hidden="true">
    <div class="drawer-inner">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="director.html">Artistic Director</a>
      <a href="concerts.html">Concerts</a>
      <a href="auditions.html">Auditions</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </div>
  </div>
</header>

<main class="container">
  <!-- Two-column layout (photo left, text right) -->
  <section class="contact-section">
    <h1 class="page-title">Contact</h1>

    <p class="contact-intro">We look forward to hearing from you! Please email us at info(at)summerblooms.org or send a message here:</p>

      <form id="contactForm" class="contact-form" action="https://formspree.io/f/xkovekny" method="POST">
        <div class="form-row">
          <label for="cf-name">Name</label>
          <input id="cf-name" name="name" type="text" required maxlength="100">
        </div>

        <div class="form-row">
          <label for="cf-email">Your email</label>
          <input id="cf-email" name="email" type="email" required maxlength="254">
        </div>

        <div class="form-row">
          <label for="cf-message">Message</label>
          <textarea id="cf-message" name="message" rows="8" maxlength="2000" required></textarea>
          <div class="char-row">
            <div class="char-hint" aria-hidden="true">Maximum 2000 characters.</div>
            <div class="char-counter" id="cf-counter" aria-live="polite">0 / 2000</div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit">Send message</button>
        </div>

      </form>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    © <span id="y"></span> Summer Blooms, Moorhead, MN
  </div>
</footer>

<script src="./script.js"></script>


</body>
</html>
